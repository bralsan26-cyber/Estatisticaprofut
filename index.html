<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StatsPro - Dashboard Futebol</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a14;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ======================================== */
        /* HEADER */
        /* ======================================== */
        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #0f3460 100%);
            padding: 15px 20px;
            text-align: center;
            border-bottom: 3px solid #e94560;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .header h1 { color: #e94560; font-size: 2em; margin-bottom: 3px; }
        .header .subtitle { color: #aaa; font-size: 0.85em; margin-bottom: 10px; }
        .filtros { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; align-items: center; }
        .filtros select, .filtros input {
            padding: 8px 12px; border-radius: 6px; border: 1px solid #333;
            background: #1a1a2e; color: #e0e0e0; font-size: 13px; min-width: 150px;
        }
        .filtros select:focus, .filtros input:focus { outline: none; border-color: #e94560; }
        .btn {
            padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer;
            font-weight: bold; font-size: 13px; transition: all 0.3s;
        }
        .btn-primary { background: #e94560; color: white; }
        .btn-primary:hover { background: #c73e54; }
        .btn-secondary { background: #333; color: #e0e0e0; }
        .btn-secondary:hover { background: #444; }

        /* ======================================== */
        /* LAYOUT PRINCIPAL */
        /* ======================================== */
        .main-layout {
            display: flex;
            flex: 1;
            min-height: 0;
        }

        /* ======================================== */
        /* ÁREA DA TABELA */
        /* ======================================== */
        .content-area {
            flex: 1;
            min-width: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
        }
        .info-bar {
            background: #1a1a2e; padding: 10px 15px; text-align: center;
            border-radius: 8px; margin-bottom: 10px; font-size: 13px;
            display: flex; justify-content: center; align-items: center; gap: 15px; flex-wrap: wrap;
        }
        .info-bar .highlight { color: #e94560; font-weight: bold; }
        .table-wrapper {
            overflow-x: auto; border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3); flex: 1;
        }
        table {
            width: 100%; border-collapse: collapse; font-size: 11px;
            background: #1a1a2e; min-width: 900px;
        }
        thead {
            background: linear-gradient(180deg, #e94560, #c73e54);
            position: sticky; top: 0; z-index: 10;
        }
        th {
            padding: 10px 6px; text-align: center; font-weight: 600;
            color: white; white-space: nowrap; cursor: pointer;
            font-size: 10px; letter-spacing: 0.3px;
        }
        th:hover { background: rgba(0,0,0,0.2); }
        th .sort-icon { margin-left: 2px; font-size: 9px; }
        td {
            padding: 7px 6px; text-align: center;
            border-bottom: 1px solid #2a2a3e; white-space: nowrap;
        }
        tr:hover td { background: #2a2a4e; }
        .jogo-cell { text-align: left; font-weight: 500; max-width: 180px; overflow: hidden; text-overflow: ellipsis; }
        .liga-cell { color: #ffd700; font-weight: 500; }
        .placar-cell { font-weight: bold; color: #e94560; font-size: 13px; }
        .zero-cell { color: #555; }
        .pagination {
            display: flex; justify-content: center; align-items: center;
            gap: 15px; padding: 15px;
        }
        .pagination .page-info { color: #aaa; font-size: 13px; }
        .loading-container {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; padding: 80px;
        }
        .spinner {
            width: 40px; height: 40px; border: 4px solid #2a2a3e;
            border-top: 4px solid #e94560; border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .no-results { text-align: center; padding: 80px; color: #666; font-size: 15px; }
        .no-results .icon { font-size: 45px; display: block; margin-bottom: 12px; }
        .error-message {
            background: #3a1111; color: #ff6b6b; padding: 15px;
            border-radius: 8px; text-align: center; margin: 20px; border: 1px solid #e94560;
        }

        /* ======================================== */
        /* MENU LATERAL - PRÓXIMOS JOGOS */
        /* ======================================== */
        .sidebar {
            width: 300px;
            min-width: 300px;
            background: #111122;
            border-left: 2px solid #e94560;
            overflow-y: auto;
            max-height: calc(100vh - 130px);
            position: sticky;
            top: 130px;
        }
        .sidebar-header {
            background: linear-gradient(135deg, #e94560, #c73e54);
            padding: 15px;
            text-align: center;
            font-weight: bold;
            font-size: 16px;
            position: sticky;
            top: 0;
            z-index: 5;
        }
        .sidebar-filtro {
            padding: 10px;
            position: sticky;
            top: 51px;
            background: #111122;
            z-index: 5;
            border-bottom: 1px solid #2a2a3e;
        }
        .sidebar-filtro select {
            width: 100%; padding: 8px; border-radius: 6px;
            border: 1px solid #333; background: #1a1a2e; color: #e0e0e0; font-size: 12px;
        }
        .liga-group {
            margin: 5px 10px;
        }
        .liga-title {
            color: #ffd700;
            font-weight: bold;
            font-size: 14px;
            padding: 10px 5px 5px;
            border-bottom: 1px solid #2a2a3e;
            margin-bottom: 5px;
        }
        .jogo-futuro {
            display: flex;
            align-items: center;
            padding: 8px 10px;
            border-bottom: 1px solid #1a1a2e;
            font-size: 11px;
            transition: background 0.2s;
        }
        .jogo-futuro:hover { background: #1a1a3e; }
        .jogo-futuro .data-hora {
            color: #e94560;
            font-weight: bold;
            min-width: 70px;
            font-size: 10px;
        }
        .jogo-futuro .times {
            flex: 1;
            text-align: center;
            font-weight: 500;
        }
        .jogo-futuro .vs {
            color: #ffd700;
            margin: 0 4px;
            font-weight: bold;
        }
        .sidebar-loading {
            text-align: center;
            padding: 30px;
            color: #666;
        }

        /* ======================================== */
        /* BOTÃO TOGGLE SIDEBAR (MOBILE) */
        /* ======================================== */
        .toggle-sidebar {
            display: none;
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 2000;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #e94560;
            color: white;
            font-size: 22px;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(233, 68, 96, 0.4);
        }

        /* ======================================== */
        /* FOOTER */
        /* ======================================== */
        footer {
            text-align: center; padding: 15px; color: #555;
            font-size: 11px; border-top: 1px solid #1a1a2e; margin-top: auto;
        }

        /* ======================================== */
        /* RESPONSIVO */
        /* ======================================== */
        @media (max-width: 1024px) {
            .sidebar {
                width: 250px;
                min-width: 250px;
            }
        }
        @media (max-width: 768px) {
            .main-layout { flex-direction: column; }
            .sidebar {
                width: 100%; min-width: 100%; max-height: none;
                position: relative; top: auto;
                display: none;
            }
            .sidebar.open { display: block; }
            .toggle-sidebar { display: block; }
            .header h1 { font-size: 1.5em; }
            .filtros { flex-direction: column; }
            .filtros select, .filtros input { width: 100%; min-width: auto; }
            th, td { font-size: 9px; padding: 4px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>⚽ StatsPro</h1>
        <p class="subtitle">Dashboard de Estatísticas Esportivas</p>
        <div class="filtros">
            <select id="filtroLiga">
                <option value="">🏆 Todas as Ligas</option>
            </select>
            <input type="text" id="filtroTime" placeholder="🔍 Buscar time...">
            <button class="btn btn-primary" onclick="aplicarFiltros()">🔍 Filtrar</button>
            <button class="btn btn-secondary" onclick="limparFiltros()">✖ Limpar</button>
        </div>
    </div>

    <div class="main-layout">
        <!-- ÁREA PRINCIPAL - TABELA -->
        <div class="content-area">
            <div class="info-bar">
                📊 <span>Jogos: <span class="highlight" id="totalJogos">0</span></span>
                📅 <span>Atualizado: <span class="highlight" id="ultimaAtualizacao">-</span></span>
                <button class="btn btn-secondary" onclick="carregarDados()" style="padding:5px 12px;font-size:11px;">🔄 Atualizar</button>
            </div>
            <div class="table-wrapper">
                <div id="loadingContainer" class="loading-container">
                    <div class="spinner"></div>
                    <p>Carregando dados...</p>
                </div>
                <div id="errorContainer" class="error-message" style="display:none;"></div>
                <table id="tabela" style="display:none;">
                    <thead id="cabecalho"></thead>
                    <tbody id="corpoTabela"></tbody>
                </table>
                <div id="noResults" class="no-results" style="display:none;">
                    <span class="icon">📭</span> Nenhum jogo encontrado
                </div>
            </div>
            <div class="pagination" id="pagination" style="display:none;">
                <button class="btn btn-secondary" id="btnAnterior" onclick="paginaAnterior()">⬅ Anterior</button>
                <span class="page-info" id="pageInfo">Página 1</span>
                <button class="btn btn-primary" id="btnProximo" onclick="proximaPagina()">Próximo ➡</button>
            </div>
        </div>

        <!-- MENU LATERAL - PRÓXIMOS JOGOS -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">📅 Próximos Jogos</div>
            <div class="sidebar-filtro">
                <select id="filtroLigaProximos" onchange="filtrarProximos()">
                    <option value="">🏆 Todas as Ligas</option>
                </select>
            </div>
            <div id="proximosContainer">
                <div class="sidebar-loading">Carregando...</div>
            </div>
        </div>
    </div>

    <button class="toggle-sidebar" id="toggleSidebar" onclick="toggleSidebar()">📅</button>

    <footer>
        StatsPro © 2026 | Dados via ScoreMer | Hospedado no GitHub Pages | Conectado ao Supabase
    </footer>

    <script>
        // ============================================================
        // CONFIGURAÇÃO SUPABASE
        // ============================================================
        const SUPABASE_URL = "https://afvlhfdoqobxxvouwyzw.supabase.co";
        const SUPABASE_KEY = "sb_publishable_F60FfnGEPyWmOfdxtMoAZA_raWgMd6f";

        // ============================================================
        // VARIÁVEIS GLOBAIS - TABELA PRINCIPAL
        // ============================================================
        const ITENS_POR_PAGINA = 20;
        let paginaAtual = 1;
        let totalRegistros = 0;
        let ligaAtual = '';
        let timeAtual = '';
        let ordenacaoAtual = { coluna: 'created_at', ascendente: false };

        // ============================================================
        // FUNÇÕES DE API
        // ============================================================
        async function fetchFromSupabase(endpoint) {
            const response = await fetch(`${SUPABASE_URL}${endpoint}`, {
                headers: {
                    'apikey': SUPABASE_KEY,
                    'Authorization': `Bearer ${SUPABASE_KEY}`
                }
            });
            if (!response.ok) throw new Error(`Erro ${response.status}`);
            return response;
        }

        // ============================================================
        // CARREGAR LIGAS (TABELA)
        // ============================================================
        async function carregarLigas() {
            try {
                const response = await fetchFromSupabase('/rest/v1/jogos?select=liga&order=liga');
                const dados = await response.json();
                const ligas = [...new Set(dados.map(d => d.liga))].sort((a, b) => a - b);
                const select = document.getElementById('filtroLiga');
                ligas.forEach(liga => {
                    const option = document.createElement('option');
                    option.value = liga;
                    option.textContent = `Liga ${liga}`;
                    select.appendChild(option);
                });
            } catch (erro) {
                console.error('Erro ao carregar ligas:', erro);
            }
        }

        // ============================================================
        // CARREGAR DADOS TABELA PRINCIPAL
        // ============================================================
        async function carregarDados(pagina = 1) {
            const loading = document.getElementById('loadingContainer');
            const tabela = document.getElementById('tabela');
            const errorContainer = document.getElementById('errorContainer');
            const noResults = document.getElementById('noResults');
            const pagination = document.getElementById('pagination');
            
            loading.style.display = 'flex';
            tabela.style.display = 'none';
            errorContainer.style.display = 'none';
            noResults.style.display = 'none';
            pagination.style.display = 'none';
            
            paginaAtual = pagina;
            
            try {
                let query = `/rest/v1/jogos?select=*`;
                if (ligaAtual) query += `&liga=eq.${ligaAtual}`;
                if (timeAtual) query += `&jogo=ilike.*${encodeURIComponent(timeAtual)}*`;
                const ordem = ordenacaoAtual.ascendente ? 'asc' : 'desc';
                query += `&order=${ordenacaoAtual.coluna}.${ordem}`;
                const inicio = (pagina - 1) * ITENS_POR_PAGINA;
                query += `&limit=${ITENS_POR_PAGINA}&offset=${inicio}`;
                
                const response = await fetch(`${SUPABASE_URL}${query}`, {
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'Prefer': 'count=exact'
                    }
                });
                
                if (!response.ok) throw new Error(`Erro ${response.status}`);
                
                const dados = await response.json();
                totalRegistros = parseInt(response.headers.get('content-range')?.split('/')[1] || dados.length);
                
                document.getElementById('totalJogos').textContent = totalRegistros;
                document.getElementById('ultimaAtualizacao').textContent = new Date().toLocaleString('pt-BR');
                
                if (dados.length === 0) {
                    noResults.style.display = 'block';
                } else {
                    preencherTabela(dados);
                    tabela.style.display = 'table';
                    atualizarPaginacao();
                    pagination.style.display = 'flex';
                }
            } catch (erro) {
                console.error('Erro:', erro);
                errorContainer.textContent = '❌ Erro ao conectar com Supabase.';
                errorContainer.style.display = 'block';
            } finally {
                loading.style.display = 'none';
            }
        }

        function preencherTabela(dados) {
            const thead = document.getElementById('cabecalho');
            const tbody = document.getElementById('corpoTabela');
            const colunas = [
                { key: 'jogo', nome: 'Jogo', classe: 'jogo-cell' },
                { key: 'liga', nome: 'Liga', classe: 'liga-cell' },
                { key: 'placar_ft', nome: 'Placar', classe: 'placar-cell' },
                { key: 'gols_c_pt', nome: 'Gols Casa' },
                { key: 'gols_v_pt', nome: 'Gols Vis' },
                { key: 'c10_casa', nome: 'C10 Casa' },
                { key: 'c10_vis', nome: 'C10 Vis' },
                { key: 'canto_c_pt', nome: 'Cantos Casa' },
                { key: 'canto_v_pt', nome: 'Cantos Vis' },
                { key: 'on_c_pt', nome: 'On Casa' },
                { key: 'off_c_pt', nome: 'Off Casa' },
                { key: 'on_v_pt', nome: 'On Vis' },
                { key: 'off_v_pt', nome: 'Off Vis' },
                { key: 'amarelo_casa_pt', nome: 'Am. Casa' },
                { key: 'amarelo_vis_pt', nome: 'Am. Vis' },
                { key: 'vermelho_casa_pt', nome: 'Vm. Casa' },
                { key: 'vermelho_vis_pt', nome: 'Vm. Vis' }
            ];
            
            thead.innerHTML = '';
            const tr = document.createElement('tr');
            colunas.forEach(col => {
                const th = document.createElement('th');
                th.textContent = col.nome;
                th.onclick = () => ordenar(col.key);
                if (ordenacaoAtual.coluna === col.key) {
                    th.innerHTML += ` <span class="sort-icon">${ordenacaoAtual.ascendente ? '▲' : '▼'}</span>`;
                }
                tr.appendChild(th);
            });
            thead.appendChild(tr);
            
            tbody.innerHTML = '';
            dados.forEach(jogo => {
                const tr = document.createElement('tr');
                colunas.forEach(col => {
                    const td = document.createElement('td');
                    if (col.classe) td.className = col.classe;
                    let valor = jogo[col.key];
                    if (valor === 0 || valor === '0') td.classList.add('zero-cell');
                    td.textContent = valor !== null && valor !== undefined ? valor : '-';
                    tr.appendChild(td);
                });
                tbody.appendChild(tr);
            });
        }

        function ordenar(coluna) {
            if (ordenacaoAtual.coluna === coluna) {
                ordenacaoAtual.ascendente = !ordenacaoAtual.ascendente;
            } else {
                ordenacaoAtual.coluna = coluna;
                ordenacaoAtual.ascendente = false;
            }
            carregarDados(1);
        }

        function aplicarFiltros() {
            ligaAtual = document.getElementById('filtroLiga').value;
            timeAtual = document.getElementById('filtroTime').value.trim();
            carregarDados(1);
        }

        function limparFiltros() {
            document.getElementById('filtroLiga').value = '';
            document.getElementById('filtroTime').value = '';
            ligaAtual = '';
            timeAtual = '';
            carregarDados(1);
        }

        function atualizarPaginacao() {
            const totalPaginas = Math.ceil(totalRegistros / ITENS_POR_PAGINA);
            document.getElementById('pageInfo').textContent = `Página ${paginaAtual} de ${totalPaginas}`;
            document.getElementById('btnAnterior').disabled = paginaAtual <= 1;
            document.getElementById('btnProximo').disabled = paginaAtual >= totalPaginas;
        }

        function paginaAnterior() { if (paginaAtual > 1) carregarDados(paginaAtual - 1); }
        function proximaPagina() {
            const totalPaginas = Math.ceil(totalRegistros / ITENS_POR_PAGINA);
            if (paginaAtual < totalPaginas) carregarDados(paginaAtual + 1);
        }

        // ============================================================
        // MENU LATERAL - PRÓXIMOS JOGOS
        // ============================================================
        let todosProximos = [];

        async function carregarProximosJogos() {
            const container = document.getElementById('proximosContainer');
            container.innerHTML = '<div class="sidebar-loading">Carregando...</div>';
            
            try {
                const response = await fetchFromSupabase('/rest/v1/proximos_jogos?select=*&order=data_hora.asc');
                todosProximos = await response.json();
                
                // Preencher filtro de ligas
                const ligas = [...new Set(todosProximos.map(j => j.liga))].sort((a, b) => a - b);
                const select = document.getElementById('filtroLigaProximos');
                select.innerHTML = '<option value="">🏆 Todas as Ligas</option>';
                ligas.forEach(liga => {
                    const option = document.createElement('option');
                    option.value = liga;
                    option.textContent = `Liga ${liga}`;
                    select.appendChild(option);
                });
                
                renderizarProximos(todosProximos);
            } catch (erro) {
                console.error('Erro ao carregar próximos jogos:', erro);
                container.innerHTML = '<div class="sidebar-loading">Erro ao carregar</div>';
            }
        }

        function filtrarProximos() {
            const liga = document.getElementById('filtroLigaProximos').value;
            const filtrados = liga ? todosProximos.filter(j => j.liga == liga) : todosProximos;
            renderizarProximos(filtrados);
        }

        function renderizarProximos(jogos) {
            const container = document.getElementById('proximosContainer');
            
            if (jogos.length === 0) {
                container.innerHTML = '<div class="sidebar-loading">Nenhum jogo próximo</div>';
                return;
            }

            // Agrupar por liga
            const grupos = {};
            jogos.forEach(jogo => {
                if (!grupos[jogo.liga]) grupos[jogo.liga] = [];
                grupos[jogo.liga].push(jogo);
            });

            let html = '';
            for (const [liga, jogosLiga] of Object.entries(grupos).sort((a, b) => a[0] - b[0])) {
                html += `<div class="liga-group">`;
                html += `<div class="liga-title">🏆 Liga ${liga}</div>`;
                
                jogosLiga.forEach(jogo => {
                    const data = new Date(jogo.data_hora);
                    const dataStr = data.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' });
                    const horaStr = data.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
                    
                    html += `
                        <div class="jogo-futuro">
                            <span class="data-hora">${dataStr}<br>${horaStr}</span>
                            <span class="times">${jogo.casa} <span class="vs">x</span> ${jogo.visitante}</span>
                        </div>`;
                });
                
                html += `</div>`;
            }
            
            container.innerHTML = html;
        }

        // ============================================================
        // TOGGLE SIDEBAR (MOBILE)
        // ============================================================
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        // ============================================================
        // INICIALIZAÇÃO
        // ============================================================
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('filtroTime').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') aplicarFiltros();
            });
        });

        async function init() {
            await Promise.all([
                carregarLigas(),
                carregarProximosJogos()
            ]);
            await carregarDados();
        }

        init();
    </script>
</body>
</html>
